<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Problem Explorer — Sustainability & Social Innovation</title>
<style>
  :root {
    --bg: #0f1419;
    --bg-alt: #161c26;
    --bg-card: #1c232f;
    --bg-hover: #252d3c;
    --fg: #e8ecf1;
    --fg-muted: #9aa4b2;
    --fg-dim: #6b7280;
    --accent: #4cc9a1;
    --accent-2: #7aa8ff;
    --border: #2a3240;
    --cat-design: #f59e0b;
    --cat-env: #4cc9a1;
    --cat-market: #a78bfa;
    --cat-society: #f472b6;
    --cat-ops: #60a5fa;
    --shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header.top {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(15,20,25,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
  }

  .top-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.01em;
    flex: 0 0 auto;
  }
  h1 .accent { color: var(--accent); }
  h1 .sub { color: var(--fg-muted); font-weight: 400; font-size: 14px; margin-left: 8px; }

  .search-wrap {
    position: relative;
    flex: 1 1 280px;
    max-width: 500px;
  }
  .search-wrap input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--fg);
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .search-wrap::before {
    content: "⌕";
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--fg-dim);
    font-size: 16px;
  }

  .counter {
    font-size: 13px;
    color: var(--fg-muted);
    flex: 0 0 auto;
  }

  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
  }

  .filter-chip {
    padding: 6px 14px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--fg-muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .filter-chip:hover {
    background: var(--bg-hover);
    color: var(--fg);
  }
  .filter-chip.active {
    background: var(--fg);
    color: var(--bg);
    border-color: var(--fg);
  }
  .filter-chip .dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: 1px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--cat-color, var(--accent));
  }
  .card:hover {
    transform: translateY(-2px);
    border-color: var(--cat-color, var(--accent));
    box-shadow: var(--shadow);
  }
  .card-num {
    font-size: 11px;
    color: var(--fg-dim);
    font-weight: 600;
    letter-spacing: 0.1em;
  }
  .card-title {
    font-size: 17px;
    font-weight: 600;
    color: var(--fg);
    letter-spacing: -0.01em;
  }
  .card-example {
    font-size: 13px;
    color: var(--fg-muted);
    line-height: 1.5;
    flex: 1;
  }
  .card-category {
    font-size: 11px;
    color: var(--cat-color, var(--accent));
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--fg-muted);
  }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 20px;
    overflow-y: auto;
  }
  .modal-backdrop.open {
    display: flex;
  }
  .modal {
    background: var(--bg-alt);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 820px;
    width: 100%;
    box-shadow: var(--shadow);
    animation: slide-in 0.2s ease-out;
    border-top: 4px solid var(--cat-color, var(--accent));
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 80px);
  }
  @keyframes slide-in {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    padding: 24px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .modal-header-main { flex: 1; }
  .modal-num {
    font-size: 12px;
    color: var(--fg-dim);
    font-weight: 600;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .modal-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .modal-category {
    display: inline-block;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 999px;
    background: var(--cat-color, var(--accent));
    color: var(--bg);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .modal-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg-muted);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .modal-close:hover {
    background: var(--bg-hover);
    color: var(--fg);
  }

  .modal-body {
    padding: 20px 28px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-example {
    font-size: 13px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .modal-example-val {
    font-size: 17px;
    color: var(--accent-2);
    font-weight: 500;
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-content h2 {
    font-size: 15px;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 20px 0 10px;
  }
  .modal-content h2:first-child { margin-top: 0; }
  .modal-content p {
    margin-bottom: 12px;
    color: var(--fg);
    font-size: 14.5px;
  }
  .modal-content ul {
    list-style: none;
    margin-bottom: 12px;
    padding-left: 0;
  }
  .modal-content li {
    position: relative;
    padding-left: 18px;
    margin-bottom: 6px;
    color: var(--fg);
    font-size: 14.5px;
  }
  .modal-content li::before {
    content: "›";
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }

  .modal-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .nav-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 9px 16px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .nav-btn:hover:not(:disabled) {
    background: var(--bg-hover);
    border-color: var(--accent);
  }
  .nav-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .nav-btn .label {
    font-size: 11px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-right: 4px;
  }
  .nav-btn .title {
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .nav-btn.prev { padding-right: 16px; }
  .nav-btn.next { padding-left: 16px; }
  .footer-center {
    font-size: 13px;
    color: var(--fg-muted);
  }

  /* Hide scrollbar but keep functionality */
  .modal-body::-webkit-scrollbar { width: 6px; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .modal-body::-webkit-scrollbar-track { background: transparent; }

  @media (max-width: 600px) {
    h1 { font-size: 17px; }
    h1 .sub { display: none; }
    main { padding: 16px; }
    .modal-header { padding: 20px 20px 12px; }
    .modal-body { padding: 16px 20px; }
    .modal-footer { padding: 12px 20px; flex-wrap: wrap; }
    .modal-title { font-size: 20px; }
    .nav-btn .title { max-width: 100px; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <h1>Problem <span class="accent">Explorer</span> <span class="sub">37 case studies in sustainable innovation</span></h1>
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search by title, example, or keyword…" autocomplete="off">
    </div>
    <div class="counter" id="counter"></div>
  </div>
</header>

<main>
  <div class="filter-bar" id="filters"></div>
  <div id="grid" class="grid"></div>
  <div id="no-results" class="no-results" style="display:none">No problems match your search.</div>
</main>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-header-main">
        <div class="modal-num" id="m-num"></div>
        <div class="modal-title" id="m-title"></div>
        <span class="modal-category" id="m-cat"></span>
      </div>
      <button class="modal-close" id="m-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-example">Example</div>
      <div class="modal-example-val" id="m-example"></div>
      <div class="modal-content" id="m-content"></div>
    </div>
    <div class="modal-footer">
      <button class="nav-btn prev" id="m-prev">
        <span>◂</span> <span class="label">Prev</span> <span class="title" id="m-prev-title"></span>
      </button>
      <div class="footer-center" id="m-counter"></div>
      <button class="nav-btn next" id="m-next">
        <span class="title" id="m-next-title"></span> <span class="label">Next</span> <span>▸</span>
      </button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script>
  const CATEGORIES = [
    { name: 'All', color: '#e8ecf1' },
    { name: 'Design & Durability', color: '#f59e0b' },
    { name: 'Environment & Resources', color: '#4cc9a1' },
    { name: 'Market & Economy', color: '#a78bfa' },
    { name: 'Society & Ethics', color: '#f472b6' },
    { name: 'Operations & Behavior', color: '#60a5fa' },
  ];
  const CAT_COLOR = Object.fromEntries(CATEGORIES.map(c => [c.name, c.color]));

  let state = { search: '', category: 'All', current: null };

  // Render filter chips
  const filtersEl = document.getElementById('filters');
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-chip' + (cat.name === 'All' ? ' active' : '');
    btn.dataset.cat = cat.name;
    if (cat.name !== 'All') {
      btn.innerHTML = `<span class="dot" style="background:${cat.color}"></span>${cat.name}`;
    } else {
      btn.textContent = cat.name;
    }
    btn.onclick = () => {
      state.category = cat.name;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c.dataset.cat === cat.name));
      render();
    };
    filtersEl.appendChild(btn);
  });

  // Render grid
  const gridEl = document.getElementById('grid');
  const counterEl = document.getElementById('counter');
  const noResultsEl = document.getElementById('no-results');

  function getFiltered() {
    const q = state.search.toLowerCase().trim();
    return PROBLEMS.filter(p => {
      if (state.category !== 'All' && p.category !== state.category) return false;
      if (!q) return true;
      return (p.title + ' ' + p.example + ' ' + p.body + ' ' + p.category).toLowerCase().includes(q);
    });
  }

  function render() {
    const items = getFiltered();
    gridEl.innerHTML = '';
    items.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--cat-color', CAT_COLOR[p.category]);
      card.innerHTML = `
        <div class="card-num">№ ${p.num}</div>
        <div class="card-title">${escapeHtml(p.title)}</div>
        <div class="card-example">${escapeHtml(p.example)}</div>
        <div class="card-category">${escapeHtml(p.category)}</div>
      `;
      card.onclick = () => openModal(p.num);
      gridEl.appendChild(card);
    });
    noResultsEl.style.display = items.length === 0 ? 'block' : 'none';
    counterEl.textContent = items.length === PROBLEMS.length
      ? `${PROBLEMS.length} problems`
      : `${items.length} of ${PROBLEMS.length}`;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, ch => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[ch]));
  }

  function formatBody(text) {
    // Convert our markdown-ish format to HTML
    const lines = text.split('\n');
    let html = '';
    let inList = false;
    for (const raw of lines) {
      const line = raw.trim();
      if (!line) {
        if (inList) { html += '</ul>'; inList = false; }
        continue;
      }
      if (line.startsWith('## ')) {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<h2>${escapeHtml(line.slice(3))}</h2>`;
      } else if (line.startsWith('• ') || line.startsWith('- ')) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += `<li>${escapeHtml(line.slice(2))}</li>`;
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        html += `<p>${escapeHtml(line)}</p>`;
      }
    }
    if (inList) html += '</ul>';
    return html;
  }

  // Modal
  const backdropEl = document.getElementById('modal-backdrop');
  const modalEl = document.getElementById('modal');
  const mNum = document.getElementById('m-num');
  const mTitle = document.getElementById('m-title');
  const mCat = document.getElementById('m-cat');
  const mExample = document.getElementById('m-example');
  const mContent = document.getElementById('m-content');
  const mPrev = document.getElementById('m-prev');
  const mNext = document.getElementById('m-next');
  const mPrevTitle = document.getElementById('m-prev-title');
  const mNextTitle = document.getElementById('m-next-title');
  const mCounter = document.getElementById('m-counter');
  const mClose = document.getElementById('m-close');

  function openModal(num) {
    const p = PROBLEMS.find(x => x.num === num);
    if (!p) return;
    state.current = num;
    const color = CAT_COLOR[p.category];
    modalEl.style.setProperty('--cat-color', color);
    mCat.style.setProperty('--cat-color', color);
    mCat.style.background = color;
    mNum.textContent = `№ ${p.num}`;
    mTitle.textContent = p.title;
    mCat.textContent = p.category;
    mExample.textContent = p.example;
    mContent.innerHTML = formatBody(p.body);

    // nav within the currently-filtered list so search/filter context is preserved
    const items = getFiltered();
    const idx = items.findIndex(x => x.num === num);
    const hasItem = idx !== -1;
    const prev = hasItem && idx > 0 ? items[idx - 1] : null;
    const next = hasItem && idx < items.length - 1 ? items[idx + 1] : null;
    mPrev.disabled = !prev;
    mNext.disabled = !next;
    mPrev.onclick = () => prev && openModal(prev.num);
    mNext.onclick = () => next && openModal(next.num);
    mPrevTitle.textContent = prev ? prev.title : '';
    mNextTitle.textContent = next ? next.title : '';
    mCounter.textContent = hasItem ? `${idx + 1} / ${items.length}` : `№ ${num}`;

    backdropEl.classList.add('open');
    document.body.style.overflow = 'hidden';
    document.querySelector('.modal-body').scrollTop = 0;
    location.hash = p.num;
  }

  function closeModal() {
    backdropEl.classList.remove('open');
    document.body.style.overflow = '';
    state.current = null;
    if (location.hash) {
      history.replaceState(null, '', location.pathname + location.search);
    }
  }

  mClose.onclick = closeModal;
  backdropEl.onclick = (e) => { if (e.target === backdropEl) closeModal(); };

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (!state.current) {
      if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
        e.preventDefault();
        document.getElementById('search').focus();
      }
      return;
    }
    if (e.key === 'Escape') closeModal();
    else if (e.key === 'ArrowLeft' && !mPrev.disabled) mPrev.click();
    else if (e.key === 'ArrowRight' && !mNext.disabled) mNext.click();
  });

  // Search
  document.getElementById('search').addEventListener('input', (e) => {
    state.search = e.target.value;
    render();
  });

  // Hash deep-link
  function openFromHash() {
    const h = location.hash.replace('#', '');
    if (h && PROBLEMS.find(p => p.num === h)) {
      openModal(h);
    }
  }

  render();
  openFromHash();
  window.addEventListener('hashchange', () => {
    const h = location.hash.replace('#', '');
    if (!h) closeModal();
    else if (h !== state.current) openFromHash();
  });
</script>
</body>
</html>
